  next_due: "2026-10-16"
  log:
    - date: "2026-07-18"
      note: "Initial Company Intelligence record established under PI-0005."
sources:
  - note: "ExxonMobil FY2025 Form 10-K (filed 2026-02-18, accession 0000034088-26-000045) and FY2025 full-year results release (2026-01-30) -- full-year earnings ($28.8B), shareholder distributions ($37.2B: $17.2B dividends + $20.0B buybacks), 43rd consecutive year of dividend increases. FY2025 total revenue is not included here -- secondary sources disagreed materially ($323.9B vs. $332.2B) and this was not resolved."
    url: "https://www.sec.gov/Archives/edgar/data/34088/000003408826000045/xom-20251231.htm"
  - note: "ExxonMobil Q1 2026 results release (reported 2026-05-01) and supporting Form 8-K -- Q1 2026 revenue ($85.1B vs. $83.1B prior-year quarter), GAAP earnings ($4.2B / $1.00 per diluted share), earnings excluding identified items ($4.9B / $1.16/share), and earnings excluding identified items and unfavorable estimated timing effects ($8.8B / $2.09/share). Segment results: Upstream $5.7B; Energy Products a $1.3B GAAP loss, with ExxonMobil's non-GAAP presentation excluding estimated timing effects showing materially stronger segment economics (reported elsewhere at approximately $2.8B, up roughly $2B year-over-year on improved refining margins); Chemical Products $0.1B; Specialty Products $0.7B."
    url: "https://www.sec.gov/Archives/edgar/data/0000034088/000003408826000065/livef8k1q26991.htm"
  - note: "2026 capital-expenditure guidance ($27-29B cash capex) and Permian/Guyana production targets, from ExxonMobil's January 30, 2026 earnings materials. Gulf Coast CCS contracted-tonnage figure (~9 million metric tons/year under third-party contract, including Linde, CF Industries, NG3, Lake Charles Methanol II, and Nucor)."
    url: "https://investor.exxonmobil.com/sec-filings/all-sec-filings/content/0000034088-26-000033/livef8k4q25991.htm"
  - note: "Dividend history: 43 consecutive years of annual increases; current quarterly rate $1.03/share, up from $0.99 (2024) and $0.95 (2023). Corroborated via independent dividend-tracking sources and news coverage."
  - note: "March 2025 Guyana-Venezuela incident: a Venezuelan Coast Guard patrol vessel (identified as ABF Guaiqueri PO-11) entered Guyana's exclusive economic zone and approached the FPSO Prosperity, interrogating ship captains over several hours. The U.S. State Department and the Organization of American States responded; Venezuela disputed the characterization given the unresolved maritime boundary. The underlying territorial dispute remains before the International Court of Justice."

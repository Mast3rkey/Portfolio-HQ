conviction:
  rating: High
  rationale: "ISRG's FY2025 results show broad-based growth across systems, recurring instruments and accessories, and service revenue simultaneously -- Systems revenue up 26%, Instruments and accessories revenue up 19%, and Service revenue up 20% -- with the recurring revenue lines growing nearly as fast as, or faster than, systems sales, indicating durable rather than one-time revenue growth. The installed base grew 12% to 11,106 da Vinci systems, and the newer Ion platform grew procedures by approximately 51%, evidence of both platform durability and expansion into a second product line. Conviction is High rather than Very High because of real, disclosed-relevant competitive-entry risk into robotic-assisted surgery and reimbursement/hospital-capital-budget exposure, and because a full enumeration of Intuitive's own Form 10-K risk-factor text was not independently inspected in this packet's research. This rating explicitly excludes valuation, entry-price, allocation, trading, and margin judgments, and was not inferred from ISRG's existing T2 portfolio-tier placement -- it was reasoned solely from the disclosed growth breadth described above."

      note: "Corrections applied following independent PR review of PI-0018's implementation PR (#126), which directly rendered and inspected NVIDIA's Q1 FY2027 press release and Form 10-Q, the BIS January 2026 licensing announcement, the White House January 2026 tariff proclamation, and BIS's May 2026 guidance -- sources this implementation session itself remained access-blocked from rendering. Corrected: GAAP diluted EPS from a mistaken $1.87 (which is the non-GAAP figure) to the correct $2.39; upgraded customer-concentration figures (21%/17%/16% of revenue, 30%/18%/16% of accounts receivable) from secondary to primary-source-verified; resolved R&D expense ($6.321B), the cash/marketable-securities categories, and the operating-income-to-net-income bridge (previously left unresolved) using the 10-Q's own figures; corrected chronology so the January and May 2026 regulatory developments are described as predating, not following, the original 2026-07-18 record; separated the BIS licensing rule from the White House tariff proclamation, which are two distinct actions; corrected the later BIS guidance date to 2026-05-31 (the 2026-06-01 date was a secondary article's publication date, not the guidance's own date); removed unsupported precision from the competition/supply-chain risk entries (an ~80% market-share figure, a 'faster-growing'/inference-concentration characterization, a 'fabricated via Broadcom/Marvell' mischaracterization, and unsourced TSMC CoWoS-allocation/sold-out claims), replacing them with NVIDIA's own Q1 FY2027 Form 10-Q risk-factor language. conviction.rating preserved at High throughout, per PI-0018 Sec E; no tier/target/holdings/allocator/margin change made."

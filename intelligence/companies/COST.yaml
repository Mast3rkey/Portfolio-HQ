sector: Consumer Staples
industry: Discount Stores / Warehouse Clubs
portfolio_role_ref: T1
competitive_advantages:
  - "Membership-fee-funded low-margin model creates a durable price advantage competitors without a comparable membership base struggle to match"
  - "High membership renewal rates (92.2% U.S./Canada, 89.7% worldwide, per Q3 FY2026 disclosure; 92.3%/89.8% at FY2025 year-end) indicate durable recurring-revenue loyalty"
  - "Large-scale bulk purchasing power across 933 currently operated warehouses (per the 2026-07-08 June sales release; 914 in the U.S. and 12 other countries at FY2025 year-end) supports cost leadership"
  - "Limited SKU count (concentrated assortment), a long-documented Costco operating characteristic, supports inventory turnover and per-SKU purchasing leverage versus traditional big-box retailers"
risks:
  - risk: "Vigorous competition from Amazon, Walmart (including Sam's Club), Target, BJ's Wholesale, and other general-merchandise and e-commerce retailers"
    severity: moderate
    identified: "2026-07-17"
    status: monitoring
  - risk: "Rising labor costs in a structurally low-margin business model, driven by recurring wage increases under a multi-year employee compensation agreement. Factual anchor (added at the 2026-07-23 refresh): the Teamsters announced unfair-labor-practice charges 2024-12-04 (union allegations, not adjudicated findings); announced an 85% strike-authorization vote 2025-01-20, with the national agreement covering more than 18,000 workers then expiring 2025-01-31; a new national agreement was entered effective 2025-02-01, running through 2028-01-31 and subsequently described by the Teamsters as ratified, preventing the threatened stoppage; and a narrower June 2025 Teamsters Local 174 wage-theft complaint (~150 drivers in Sumner, WA; alleged unpaid retroactive wage increases -- union allegations) remains unresolved, with no agency disposition located"
    severity: moderate
    identified: "2026-07-17"
    status: monitoring
  - risk: "Membership renewal-rate sensitivity to a growing mix of digitally-sold/promoted memberships, which renew at a slightly lower rate on average"
    severity: low
    identified: "2026-07-17"
    status: monitoring
  - risk: "Execution risk in e-commerce/digital operations as customer expectations for online ordering, delivery, and curbside service continue to rise"
    severity: moderate
    identified: "2026-07-17"
    status: monitoring
  - risk: "Tariff exposure on merchandise costs, and foreign-currency exposure across international operations, partially hedged via forward foreign-exchange contracts"
    severity: low
    identified: "2026-07-17"
    status: monitoring
  - risk: "Stockov v. Costco Wholesale Corporation (N.D. Ill. No. 1:26-cv-02734), a proposed consumer class action filed 2026-03-11 alleging -- allegations only, never established conduct -- that Costco passed IEEPA tariff costs to customers through higher prices and could obtain a 'double recovery' if it retained government tariff refunds; the proposed nationwide class covers purchasers of goods subject to IEEPA tariffs from 2025-02-01 through 2026-02-24. Procedural facts, kept distinct from the allegations: Costco moved to dismiss 2026-05-18 (its reported position: it had not received the tariff refunds at issue and the claims are speculative or premature -- a management/legal position, not a court finding); no class has been certified; the requested remedies (restitution or damages, declaratory relief, interest, fees, class treatment) had not been awarded by the filing itself; procedural status after the June 2026 briefing deadlines is unconfirmed (full public docket access-blocked at research time)"
    severity: low
    identified: "2026-07-23"
    status: monitoring
catalysts:
  - catalyst: "Fiscal 2026 warehouse expansion -- approximately 26 net new warehouse openings, per management guidance disclosed on the Q3 FY2026 earnings call, including continued international expansion (China, Mexico). Management's Q3 FY2026 supplemental projects 940 warehouses at fiscal-2026 year-end versus 914 at fiscal-2025 year-end (a management estimate: 7 opened in Q1, 3 in Q2, 4 in Q3, 12 estimated for the remainder); 933 operated as of the 2026-07-08 June sales release"
    expected: "2026-08-31"
    status: pending
conviction:
  rating: High
  rationale: "Costco's membership model, renewal behavior, purchasing scale, and operating consistency support high conviction in the durability of the business-quality thesis. The company still faces meaningful competitive, labor-cost, digital-execution, international, and merchandise-cost risks. This rating explicitly excludes valuation, entry-price, allocation, trading, and margin judgments."

sector: Industrials
industry: Electrical Equipment
portfolio_role_ref: T1
themes: [ai_infrastructure]
competitive_advantages:
  - "Large, reported backlog of power and electrification equipment orders -- FY2025 total backlog of $150 billion (+$31.2B year-over-year), grown to $163 billion by Q1 2026 and $176 billion by Q2 2026 (+$13B sequentially) -- reflecting demand across gas power, electrification, and grid equipment. Management's total-backlog target of approximately $200 billion, originally set for year-end 2028 at the December 2025 investor update, was accelerated to year-end 2027 at the Q1 2026 call and reaffirmed at the Q2 2026 call."
  - "Reported data-center-specific demand concentration in the Electrification segment: $2.4 billion in equipment orders supporting data centers booked in Q1 2026 alone (more than all of 2025 combined), followed by a further $2.7 billion in Q2 2026 alone -- bringing first-half 2026 Electrification data-center orders to more than $5 billion"
  - "Power segment gas-equipment backlog and slot-reservation agreements grew from 100 GW (Q1 2026) to 116 GW (Q2 2026), with management targeting at least 125 GW under contract by year-end 2026"
  - "Raised FY2026 guidance at the Q2 2026 call: revenue $45.5-46.5 billion (up from $44.5-45.5 billion guided at Q1) and free cash flow $11.5-12.5 billion (up from $6.5-7.5 billion guided at Q1), reported alongside Q2 2026 orders of $24.2 billion (+88% organic) and adjusted EBITDA of $1.25 billion (11.3% margin, up from 8.5% a year earlier)"
risks:
  - risk: "Execution risk on large, long-cycle projects under fixed or competitively-bid contract structures"
    severity: moderate
    identified: "2026-07-18"
    status: monitoring
  - risk: "Global supply-chain dependency for raw materials, castings, forgings, and specialized components, where a single delayed input can delay a larger system delivery"
    severity: moderate
    identified: "2026-07-18"
    status: monitoring
  - risk: "Disclosed margin softness in Wind and European Electrification specifically, distinct from stronger Power/Electrification segment performance elsewhere. Wind segment EBITDA losses widened to $382 million in Q1 2026 (-26.7% margin, vs. -7.9% a year earlier) and $275 million in Q2 2026 (-13.6% margin, vs. -7.3% a year earlier); management maintained FY2026 Wind EBITDA-loss guidance of approximately $400 million at the Q2 2026 call"
    severity: moderate
    identified: "2026-07-22"
    status: monitoring
  - risk: "Reliance on continued data-center-driven order flow within the Electrification segment for a portion of recent order growth"
    severity: low
    identified: "2026-07-18"
    status: monitoring
  - risk: "Tariff exposure -- management's net 2026 tariff-impact estimate was $100-200 million as of the Q2 2026 call, down from a $250-350 million estimate given at Q1 2026. The current, lower estimate is the operative figure; the superseded Q1 estimate is retained here as history"
    severity: moderate
    identified: "2026-07-22"
    status: monitoring
catalysts:
  - catalyst: "Backlog-to-revenue conversion pace, including management's total-backlog target of approximately $200 billion -- originally year-end 2028 (December 2025 investor update), accelerated to year-end 2027 at the Q1 2026 call and reaffirmed at the Q2 2026 call"
    expected: "2027-12-31"
    status: pending
conviction:
  rating: Medium
  rationale: "GE Vernova's demand signal has continued to build through Q2 2026: FY2025 orders ($59.3B, +34% organic), total backlog reaching $176B by Q2 2026 (from $150B at FY2025), Q2 2026 orders of $24.2B (+88% organic), and cumulative H1 2026 Electrification data-center orders exceeding $5B all reflect real, demonstrated demand tied to the AI-infrastructure power buildout, reinforced by a Q2 2026 guidance raise (FY2026 revenue to $45.5-46.5B, free cash flow to $11.5-12.5B). Conviction is Medium rather than High because the company's own disclosed risk profile centers on execution across large, long-cycle, fixed/competitively-bid contracts, with margin softness specifically flagged in Wind and European Electrification -- Wind's EBITDA losses widened further in H1 2026 (Q1 -$382M, Q2 -$275M) even as management maintained its ~$400M FY2026 Wind loss guidance, and 2026 tariff exposure, while reduced from the Q1 2026 estimate, remains a live, disclosed cost. This rating explicitly excludes valuation, entry-price, allocation, trading, and margin judgments."

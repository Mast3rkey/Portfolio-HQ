      note: "Bounded corrective pass on PR #132 (same Eastern calendar day as the evidence refresh above -- authored 2026-07-22 21:17 America/Detroit, which resolved to 2026-07-23 in this session's UTC-clocked cloud environment; per repository precedent (commit 413850b, 'Correct staleness report as-of date to explicit America/Toronto calendar date'), the operational Eastern date governs an as-of/corrective date, not an implicit UTC environment date, so this and every other date this pass touches is recorded as 2026-07-22), addressing an independent review of the refresh above. (1) Corrected a pre-existing mislabeling (present since the original 2026-07-18 record) of the FY2025 $59.3B orders figure as 'Power/Electrification orders' -- it is total-company orders, led by equipment at Power and Electrification and services in each segment, per the official press release's own language. (2) Investigated the reviewer's proposed EBIT/EBITDA relabeling of the Wind segment loss figures. The quarterly actuals ($382M Q1, $275M Q2) remain labeled segment EBITDA, independently corroborated. The approximately $400M FY2026 full-year Wind loss guide's exact metric basis is NOT independently confirmed via a reproducible primary-source read: an earlier corrective attempt claimed a direct quoted primary-source match to 'segment EBITDA losses,' but that quote could not be independently reproduced on further re-verification, and secondary sources continue to render this specific figure inconsistently (some as EBIT, some as EBITDA). This record now treats the FY guide's metric basis as an unresolved, moderate-confidence inference (EBITDA, by analogy to GE Vernova's standing per-segment reporting convention) rather than a confirmed fact -- no confident relabeling in either direction, and the H1/H2 committee arithmetic is now caveated for this basis uncertainty. (3) Restored the Wind/European Electrification margin-softness risk's identified date to 2026-07-18 (its true original identification date) after an earlier pass incorrectly re-dated it to 2026-07-22 while only updating its evidence. (4) Corrected two literal 'SS' encoding artifacts in GEV.md to the intended section-symbol (§) references. (5) Trimmed the source-access disclosure to remove transient session-tooling detail (a reader-proxy/text-extraction-relay workaround) not relevant to a durable company record, while retaining which primary hosts (SEC EDGAR, gevernova.com) remained inaccessible and which claims rely on secondary corroboration only. (6) Consolidated corrective narrative that had been restated across multiple GEV.md sections (header, source-access disclosure, unresolved-items, conviction, sources) into this single review.log entry, so process history does not overwhelm the company analysis. No tier, target, holdings, roster, cluster, cap, allocator, margin, or conviction-rating change; conviction.rating remains exactly Medium."

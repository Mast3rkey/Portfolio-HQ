sector: Information Technology
industry: Semiconductors & Semiconductor Equipment
portfolio_role_ref: T1
themes: [ai_infrastructure]
competitive_advantages:
  - "Leading-edge process-technology and advanced-packaging capability"
  - "Deeply embedded customer collaboration and high design-in/switching costs"
  - "Manufacturing scale and execution across a broad technology portfolio"
  - "Continuing leading-edge roadmap, including N2, N2P, and A16"
risks:
  - risk: "Customer concentration -- largest customer 19% and second-largest customer 17% of 2025 revenue per Form 20-F, combining to 78% for the top ten; customer identities are not disclosed"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
  - risk: "Taiwan/cross-strait geopolitical and political-stability exposure, including tariff, sanctions, and export-control risk broadly disclosed in the Form 20-F"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
  - risk: "Nanjing (China) facility export-license risk -- the VEU authorization expired in December 2025; an annual export license currently permits continued operation; renewal or continuation is not assured"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
  - risk: "Taiwan natural-disaster and utility-disruption exposure -- recognized, insurance-net losses of approximately NT$3.0 billion (April 2024) and NT$5.3 billion (January 2025) from earthquake events, alongside disclosed water/electricity/utility-disruption risk"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
  - risk: "N2/node-transition execution -- approximately 3-4 percentage points of second-half-2026 gross-margin dilution pressure, partially offset by leading-edge demand, cost improvement, productivity gains, and capacity optimization"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
  - risk: "Overseas-fab ramp and cost execution -- a very large, newly expanded Arizona investment commitment (US$265 billion total, per management's Q2 2026 call) plus Japan and Germany facilities carry multi-year construction, staffing, and cost-to-plan execution risk"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
  - risk: "Extreme capital intensity -- Q2 2026 capital expenditure represented approximately 39% of Q2 2026 revenue amid a raised FY2026 capex guidance of US$60-64 billion"
    severity: moderate
    identified: "2026-07-19"
    status: monitoring
catalysts: []
conviction:
  rating: High
  rationale: "TSMC's verified financial quality, leading-edge process and manufacturing position, embedded customer relationships, high switching costs, and material AI/HPC demand exposure support High conviction. Conviction is High rather than Very High because Taiwan/cross-strait and Nanjing export-license risk, customer concentration, extreme capital intensity, overseas-fab execution, and semiconductor cyclicality remain material. This rating explicitly excludes valuation, entry price, allocation, trading, and margin judgments."

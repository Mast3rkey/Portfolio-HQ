# holdings.yaml — two tracks. 'shares' (ticker: qty) is the source of
# truth for any normally-traded position — live-valued every run via
# Alpaca (qty x latest price). Update it with 'allocate.py update-shares'
# after a real buy/sell/trim changes a share count.
# 'holdings' (ticker: dollar value) is the manual fallback for anything
# NOT share-tracked: SKHY (permanent zero-coverage gap on the free IEX
# feed — RSI/trend gates can never fire for it) and the crypto sleeve
# (BTC/ETH/SOL, priced live but valued from here, not qty-tracked).
# Update it with 'allocate.py update-holdings'.
# margin: synced via 'allocate.py update-margin <debt> <buffer_pct>' — buffer_pct comes from Robinhood directly (per-security maintenance
# ratios aren't available via Alpaca), so it's only as fresh as the last sync. Verify on Robinhood before any large margin-funded buy.
# IMPORTANT: always use Robinhood's own DISPLAYED buffer % — do not derive
# it from (portfolio value - maint req) / portfolio value. Checked twice
# against real screens and it doesn't reconcile (off by several points);
# Robinhood's actual formula weights something this simple subtraction misses.

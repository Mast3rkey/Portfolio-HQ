# targets.yaml — tier structure and allocation policy.
# Every percentage here is CONFIG-EDITABLE. Weights are % of total book
# (current holdings market value + new cash) unless noted.
#
# Paste your final roster into the `tickers:` lists below. ETF and spec lists
# are pre-filled per spec; edit freely.

regime_ticker: QQQ          # ticker whose EMA regime gates all new buys

tiers:
  T1:
    weight_pct: 3.35        # per-ticker target, each name in the list
    tickers: [ASML, TSM, MSFT, GOOGL, META, NVDA, GEV, LLY, V]
  T2:
    weight_pct: 1.65
    tickers: [AVGO, AMZN, CEG, PWR, ISRG, TMO, DHR, SYK, MA, BRK.B, WMT, COST, EQIX, MLM]
  ETF:
    weight_pct: 2.30
    tickers: [SPY, QQQ, GLD]
  band:
    weight_pct: 0.75
    cap_multiple: 1.25      # band positions may run up to 1.25x target
    # SKHY: live-priced via 'shares' since 2026-07-14 (Alpaca picked up coverage a
    # few days after its 2026-07-10 listing — not a permanent gap after all). RSI
    # needs 15 daily bars, trend needs 200; both still building history, so those
    # gates can't fire yet — that's insufficient history now, not a data-feed issue.
    # VMC removed 2026-07-13 — consolidated into MLM (see Decisions Log).
    # TM removed 2026-07-13 — stray typo, never held, no corresponding target.
    tickers: [KLAC, LRCX, AMAT, AMD, MU, MRVL, WDC, VRT, ETN, CAT, GNRC, IBM, NOW,
              CRM, ORCL, NFLX, SHOP, CRWD, PANW, AAPL, UBER, JPM, HOOD, XOM, CVX,
              RTX, ABBV, MRK, JNJ, GILD, UNH, BABA, SKHY, DELL]
  spec:
    weight_pct: 1.00
    fixed: true             # spec names sized at exactly target, NEVER above
    tickers: [INTC, SPCX, RKLB, TSLA, PLTR]

crypto:
  sleeve_pct: 10.0          # sleeve target as % of book; tracked, never traded here
  # HYPE removed July 2026 — the remnant in holdings is untracked inventory
  # awaiting consolidation, not a sleeve target.
  coins: [BTC, ETH, SOL]
  # Coins listed here are priced via Alpaca crypto data ('COIN/USD');
  # value = market_value from holdings.yaml.
  coingecko_ids: {}

caps:
  # Correlated clusters that must each stay <= their own % of book — blocks new
  # buys AND mechanically trims a breach, no RSI gate (concentration/correlation
  # risk limit, not a return-timing call, so it doesn't wait for a "good" price
  # like the band/spec RSI-gated trims do). Denominator is book (net equity), not
  # gross — under leverage this means a broad market decline can nudge a cap over
  # with zero real cluster-specific dispersion (fixed margin debt shrinks book
  # faster than assets), and a broad rally quietly loosens it. Identified and left
  # as-is 2026-07-13 for semis (see CLAUDE.md Decisions Log) — switching to gross
  # would remove that but understate real leverage-adjusted risk. Same property
  # applies to every cluster below.
  clusters:
    - name: semis
      pct: 25.0
      # Correlation-defined, NOT market-cap: these names crash together, and the
      # equipment (KLAC/LRCX/AMAT) and memory (MU/WDC) names crash hardest.
      # Measured honestly so the cap actually binds. SKHY counts (trades
      # regular-way as of 2026-07-13).
      tickers: [ASML, TSM, NVDA, AVGO, AMD, MU, MRVL, KLAC, LRCX, AMAT, WDC, INTC, SKHY]
    - name: power_infra
      pct: 20.0
      # Added 2026-07-14 after a one-time correlation scan (trailing ~1yr daily
      # returns, one mostly-rising-market sample): GEV/ETN/VRT/PWR showed 0.560
      # avg pairwise correlation, comparable to the semis baseline (0.542) — real
      # shared driver is AI data-center power/electricity demand buildout, not
      # just market beta. CAT and TSLA also correlated with this group in the
      # same scan but were deliberately EXCLUDED from the cap: weaker fundamental
      # fit (general industrials / EV+storage), more likely riding bull-market
      # beta than the specific power-buildout mechanism — see CLAUDE.md Decisions
      # Log. Cap set at 20% (below semis' 25%, reflecting a shorter track record
      # and narrower evidence base) with room above the 10.5% level it was at
      # when added, so it doesn't fire immediately off a diagnostic finding.
      tickers: [GEV, ETN, VRT, PWR]

levels:
  # Buy-level rungs: 50SMA minus (multiplier x ATR14). L3 is floored at the
  # 200SMA ("trend-floor") — never model a deep buy below the long-term trend.
  rung_atr_multipliers: [1.0, 2.0, 3.0]
  practicality_cap_pct: 25   # levels further below price than this = "unlikely near-term"
  swing_low_sessions: 60     # recent-support lookback

gates:
  min_lot_dollars: 25          # do not recommend buys smaller than this
  trend_rsi_override: 30       # allow add below 200-SMA only if RSI < this
  earnings_blackout_days: 7    # skip adds within this many calendar days of earnings
  trim_rsi: 60                 # trim band/spec overweights only when RSI > this

margin:
  # Doctrine (July 2026): fixed structural cap, not a timing lever. Book is
  # net equity (gross holdings minus margin debt); this cap bounds gross/equity.
  leverage_cap: 1.8            # hard ceiling on gross-position-value / net-equity
  buffer_floor_pct: 30.0       # hard cutoff: block margin buys if buffer would drop below this

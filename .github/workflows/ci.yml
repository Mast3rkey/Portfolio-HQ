name: CI

# No user-provided or repository secrets are required. No Alpaca,
# Robinhood, brokerage, live-account, or live market-data credentials are
# used anywhere in this workflow. GitHub Actions supplies its own standard,
# ephemeral, read-only GITHUB_TOKEN for checkout, and checkout is configured
# not to persist it past that step (persist-credentials: false below).
# Downloading actions and Python packages still requires ordinary CI
# network access (github.com, the Actions marketplace, PyPI) — this is not
# a network-free workflow. Within the test suite itself: production
# market-data clients (Alpaca, yfinance/Yahoo) are never invoked by the
# ordinary deterministic test suite — allocate.plan()'s earnings lookup is
# replaced with a controlled pytest fixture (conftest.py's autouse
# no_live_earnings_lookup), and the dedicated earnings.py tests
# (test_earnings.py) exercise it against mocked provider objects only, not
# a live network call.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Whitespace / diff integrity check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # fetch-depth: 0 already pulled all history for all branches
            # during checkout, so the PR's base commit should already be
            # present — no second (authenticated) fetch needed here.
            # Verify that explicitly rather than assuming it.
            if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              echo "ERROR: PR base commit $BASE_SHA not found in the checkout." >&2
              exit 1
            fi
            BASE="$(git merge-base "$BASE_SHA" HEAD)"
          else
            BASE="$BEFORE_SHA"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
              echo "No usable previous SHA for this push (e.g. new branch); diffing against the parent commit instead."
              BASE="$(git rev-parse HEAD^1)"
            fi
          fi
          echo "Diff-checking range: ${BASE}..HEAD"
          git diff --check "${BASE}" HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: YAML parse check (all tracked .yaml/.yml files)
        run: |
          python -c "
          import pathlib, subprocess, sys, yaml
          files = subprocess.run(
              ['git', 'ls-files', '*.yaml', '*.yml'],
              capture_output=True, text=True, check=True,
          ).stdout.splitlines()
          failed = False
          for f in files:
              try:
                  yaml.safe_load(pathlib.Path(f).read_text())
              except yaml.YAMLError as exc:
                  print(f'INVALID YAML: {f}: {exc}', file=sys.stderr)
                  failed = True
          print(f'Parsed {len(files)} tracked YAML file(s).')
          sys.exit(1 if failed else 0)
          "

      - name: Run test suite
        run: python -m pytest -q

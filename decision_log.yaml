# decision_log.yaml — machine-readable doctrine record, additive to CLAUDE.md's
# prose Decisions Log, not a replacement for it. CLAUDE.md stays the narrative
# source of truth (the reasoning is genuinely better read as prose); this file
# exists so "what's the current value of X and why" is queryable without
# grepping paragraphs. Every entry here must correspond to an existing
# CLAUDE.md Decisions Log entry — this file records decisions, it does not
# originate them.
#
# Schema per entry:
#   decision_id      — MARGIN-#### for this initial migration pass; other
#                       prefixes (CLUSTER-, TRIM-, WEIGHT-, ...) reserved for
#                       a future, broader migration — not started yet.
#   date              — ISO date the decision was made (from CLAUDE.md).
#   category          — one of: margin_doctrine, concentration_risk,
#                        architecture_governance (more categories added
#                        only as new entries are migrated).
#   decision          — one-sentence statement of what was decided.
#   rationale         — why, condensed from the CLAUDE.md entry; not a
#                        replacement for reading the full entry.
#   supporting_artifact — path to a backtest report, or null if the decision
#                          was doctrine-driven rather than backtest-derived
#                          (state that distinction explicitly, don't blur it).
#   status            — active | superseded | pending_evidence.
#
# Scope of this first migration pass, per explicit instruction: margin
# doctrine decisions ONLY. Two entries below. NOT migrated yet, on purpose:
# every other CLAUDE.md Decisions Log entry, including the closely-related
# "Semis cluster cap: leverage asymmetry identified" entry (2026-07-14) --
# that one is a cluster-cap decision that discusses leverage's effect on the
# cap's denominator, not itself a margin-policy decision, and is a reasonable
# candidate for a later, broader migration pass, not this one.

decisions:
  - decision_id: MARGIN-0001
    date: 2026-07-13
    category: margin_doctrine
    decision: >
      Margin allowed going forward within a fixed 1.8x structural
      gross/net-equity leverage cap and a 30% margin-buffer floor
      (hard cutoff, forced de-lever below it). Any margin-timing model
      ("borrow more when conditions look good") explicitly rejected.
    rationale: >
      Discovered ~$4,423 in existing margin debt (~1.8x gross/equity)
      contradicting the prior "no margin" rule -- this decision formalized
      the debt already in place rather than deriving a level from evidence.
      Margin-timing was rejected on the grounds that leverage amplifies
      whatever edge the portfolio already has (or doesn't); it is not
      itself a source of edge, and doctrine holds that isn't a
      backtestable question -- see docs/MARGIN_DOCTRINE.md for the full
      argument.
    supporting_artifact: null
    status: pending_evidence  # not active/settled in the evidentiary sense --
                               # Track 2 (docs/TRACK2_HYPOTHETICAL_MARGIN_SIMULATION.md)
                               # exists specifically to test whether the 1.8x
                               # level (or any level) is supported by evidence.
                               # The CAP ITSELF as a fixed, mechanical, no-exception
                               # structure is not in question (see MARGIN_DOCTRINE.md);
                               # its specific numeric level is what's pending.

  - decision_id: MARGIN-0002
    date: 2026-07-15
    category: concentration_risk
    decision: >
      Any T1 or T2 position above 1.5x its own tier target trims
      mechanically to target, no RSI gate -- same treatment as the
      correlated-cluster caps, applied per-name instead of per-cluster.
    rationale: >
      T1 AI-infra correlation-cap approach was scanned and declined
      (correlation 0.302, below the bar already set by a previously
      declined cluster) but the underlying concentration was real (T1 at
      42.1% of book vs. 30.15% target). This is a doctrine decision, not a
      backtest verdict -- same category as the 1.8x leverage cap and 30%
      buffer floor: a single core-conviction position at 2x+ target under
      leverage is a tail/forced-liquidation risk a TWR backtest can't
      price (see reports/t1t2_trim_backtest.md's NVDA decomposition:
      2.14x target, -66.4% own drawdown, levered math breaking down at
      the account's then-current 1.44x leverage).
    supporting_artifact: reports/t1t2_trim_backtest.md
    status: active  # the RETURN question this backtest tested is closed
                     # (NO CHANGE verdict on TWR/aggregate-MaxDD grounds);
                     # the trim rule itself is active in production
                     # (allocate.py plan(), gates.t1t2_trim_mult). The
                     # separate capital-impairment judgment this rule
                     # responds to was a doctrine call, not itself
                     # re-testable -- see CLAUDE.md's entry for the full
                     # precision note on what was and wasn't backtested.

  - decision_id: PI-0001
    date: 2026-07-17
    category: architecture_governance
    decision: >
      Portfolio Intelligence Engine Version 2 adopted as the canonical,
      frozen specification (docs/PORTFOLIO_INTELLIGENCE_SPEC.md). An
      explicit intelligence/index.yaml was evaluated and rejected -- the
      filesystem directory listing is the index, permanently. The
      subsystem is advisory-only: it cannot modify holdings.yaml or
      targets.yaml, cannot alter allocator recommendations, and no
      production code reads intelligence/ files under this specification.
      Freezing the specification does not authorize implementation --
      no company files, validators, reports, or integrations are created
      by this decision.
    rationale: >
      Three design-review passes (architecture proposal, formal review
      against Portfolio HQ's eight governing engineering principles, and
      a final index-necessity review) found Version 1 self-contradictory
      (claimed one-YAML-plus-one-markdown-per-company while designing
      four files per company; claimed company-first organization while
      introducing topic-first directories; reintroduced the exact
      shared-file git-merge-conflict risk the design itself had argued
      against). Version 2 resolved each defect by consolidating risks,
      catalysts, conviction, and review history into a single per-company
      YAML, keeping the review log embedded per-company rather than in a
      shared file, and requiring symbol resolution to reuse earnings.py's
      existing _YAHOO_SYMBOL-style pattern rather than invent a second
      one. The explicit-index alternative was rejected on all seven
      evaluated criteria (single source of truth, git merge behavior,
      discoverability, reporting, validation, scalability,
      implementation complexity) -- it would duplicate data already
      authoritative in company files and reintroduce the same
      merge-conflict class already eliminated from the review log.
      This entry's corresponding CLAUDE.md Decisions Log entry is the
      "Portfolio Intelligence Engine Version 2 frozen as canonical
      specification" bullet (July 2026, immediately following the semis
      cluster cap leverage-asymmetry entry) -- added to restore this
      file's own stated invariant that every structured entry traces to
      an existing CLAUDE.md entry.
    supporting_artifact: docs/PORTFOLIO_INTELLIGENCE_SPEC.md
    status: active  # specification is frozen; implementation is
                     # separately gated per spec section 20/22 and is
                     # NOT authorized by this decision alone.

  - decision_id: PI-0002
    date: 2026-07-17
    category: architecture_governance
    decision: >
      Authorizes a single, bounded Phase 1 implementation experiment:
      a standalone, read-only intelligence_validator.py that validates
      synthetic company YAML against the schema already frozen in
      docs/PORTFOLIO_INTELLIGENCE_SPEC.md SS9/14/16/20/21, plus its
      isolated test_intelligence_validator.py. The validator may scan
      intelligence/companies/*.yaml if that directory exists; a missing
      or empty directory must return success with zero covered
      companies (absence is not an error, coverage stays opt-in). The
      validator must never write files, modify source data, create
      directories, or touch holdings.yaml or targets.yaml, and must have
      zero import coupling with allocate.py or margin_state.py in either
      direction. Test data is synthetic only -- no real holding, no real
      ticker thesis, no investment judgment authored by this task.
      Explicitly excluded and deferred: any real company intelligence
      file, thesis Markdown content, template files, staleness reports,
      rollups, dashboards, allocator-visible notes, automatic tier or
      weight changes, conviction-derived calculations, holdings.yaml or
      targets.yaml edits, symbol-resolution implementation (SS15 -- moot
      at this scope since no real ticker filenames exist to resolve),
      scheduled/cron execution, margin-policy work, or anything beyond
      the validator and its isolated tests.
    rationale: >
      PI-0001 froze the Version 2 architecture but explicitly does
      not authorize implementation (spec SS20, SS24) -- an
      implementation-readiness review the same session returned REVISE
      on the proposed Phase 1 solely for lacking this authorization,
      with two other findings folded in here: (1) the spec's own SS22
      sequence puts one hand-authored real company file before any
      tooling, but authoring real investment thesis content is a human
      editorial act, not an implementation task, so this authorization
      deliberately scopes Phase 1 to schema-as-code plus a validator
      exercised only against synthetic fixtures -- no real company file
      is created by this decision or the work it authorizes; (2) a
      template file under intelligence/companies/ doesn't fit SS5's
      ticker-only directory model, so no template file is authorized
      either. PI-0002 authorizes a bounded implementation experiment
      only, not the broader Intelligence subsystem -- PI-0001 remains
      the governing architectural decision, the implementation must
      arrive through its own separate branch and PR, this governance
      entry does not itself authorize merging that future PR, and any
      expansion beyond this exact scope requires another documented
      decision.
    supporting_artifact: docs/PORTFOLIO_INTELLIGENCE_SPEC.md
    status: active  # authorizes the bounded Phase 1 experiment only;
                     # does NOT authorize the broader subsystem, does
                     # NOT pre-approve the future implementation PR's
                     # merge, and does NOT expand PI-0001's scope.

  - decision_id: PI-0003
    date: 2026-07-17
    category: architecture_governance
    decision: >
      Authorizes bounded Portfolio Intelligence Phase 2 pilot: creation
      of intelligence/companies/, one real TICKER.yaml company record,
      and one matching TICKER.md thesis narrative, for exactly one
      company. Content is human-authored research and judgment only,
      validated read-only via the existing intelligence_validator.py.
      No second company record is authorized until this pilot is
      reviewed.
    rationale: >
      PI-0002 authorized only the validator; no company content exists
      yet. A same-session Phase 2 readiness review found the validator
      faithful to spec SS9/14/16/20/21 with no blocking defects, and
      confirmed a single human-authored pilot is the narrowest
      reversible next step in the spec's own SS22 incremental sequence.
      A one-company pilot is preferable to every considered
      alternative: a template file doesn't fit SS5's ticker-only
      directory model (same reasoning PI-0002 already applied);
      additional synthetic examples add nothing beyond the 28 tests
      Phase 1 already shipped, since the entire point of SS22 step 1 is
      to prove the schema against real human judgment, which only real
      content can do; multiple companies at once would violate the
      smallest-reversible-step discipline this repo has applied to
      every prior gate (rungs, trims, weights, the T1/T2 ceiling) --
      one company lets the schema and workflow get reviewed before any
      roster-wide pattern is set, consistent with SS16's opt-in
      coverage policy, not a rollout target; and reporting
      infrastructure (the SS18 staleness report) is explicitly SS22
      step 3, strictly after real validated content exists to scan --
      building it first would have nothing real to report on.
      Allocator integration remains out of scope for the same reason it
      has been excluded from every prior authorization: SS19/SS20 gate
      any allocator-visible integration behind its own separate
      research, justification, testing, and approval, and this pilot
      does not attempt to meet that bar -- it is a content experiment,
      not an integration one. This remains a reversible architectural
      checkpoint: the pilot lands on its own branch/PR, is reviewed
      before any second company is considered, and can be discarded or
      revised without touching any other part of the repository, since
      nothing outside intelligence/ reads it.
      portfolio_role_ref doctrine: unchanged from spec SS14, refined
      here for separation of concerns only, not broadened -- it is
      descriptive only, a Portfolio Intelligence field that records a
      human's own characterization of a company's role, and it does
      not authorize, derive, or infer any allocation behavior; it is
      not itself a source of allocator meaning. Its meaning is fixed at
      authoring time by the human who set it, not by whatever
      targets.yaml happens to contain at read time -- changes to
      allocator implementation (sleeves, bands, tiers, weights, or any
      other allocation mechanics) do not retroactively change the
      meaning of an existing Portfolio Intelligence record. This
      decision does not enumerate, restrict, or hardcode a specific
      list of role names into Portfolio Intelligence governance text;
      doing so would import an allocator-internal implementation
      detail into a layer SS2's non-goals and SS4's one-way data flow
      both already require to stay independent of it. If Portfolio
      Intelligence role semantics ever need to change, that is its own
      future, separately-documented governance decision -- semantics
      are never silently inherited from an allocator-side change, and
      no amendment to this doctrine is folded into this pilot's
      authorization.
    supporting_artifact: docs/PORTFOLIO_INTELLIGENCE_SPEC.md
    status: accepted  # authorizes exactly one pilot company record;
                       # does NOT authorize a second company, allocator
                       # integration, generated conviction scoring,
                       # symbol resolution, dashboards/reports/rollups/
                       # index.yaml, templates under
                       # intelligence/companies/, or any change to
                       # holdings.yaml/targets.yaml.

  - decision_id: PI-0004
    date: 2026-07-17
    category: architecture_governance
    decision: >
      Closes the PI-0003 pilot-review gate and conditionally authorizes
      Portfolio Intelligence expansion beyond the COST pilot. Four
      decisions: (1) defines "pilot reviewed" as requiring all of --
      implementation merged to main, validator passing, full test
      suite passing, an architectural retrospective completed, and any
      governance ambiguities the retrospective identifies explicitly
      resolved by governance -- a reusable completion criterion for
      future pilots, not a one-off interpretation; (2) confirms all
      five conditions are now met for the COST pilot as of this
      decision's adoption (the fifth condition -- ambiguity resolution
      -- is satisfied by this decision itself, items 2-4 below); (3)
      freezes conviction.rating to a closed four-point vocabulary --
      Low, Medium, High, Very High -- no other value, synonym, numeric
      scale, or hyphenated hybrid permitted; changing this vocabulary
      requires its own future governance decision. COST's existing
      "High" rating already conforms, no migration needed; (4)
      explicitly defers freezing risk.severity and risk.status --
      one company record is insufficient evidence to justify a closed
      vocabulary for either field; revisit once 3-5 company records
      exist and real usage patterns are observable. This is a
      deliberate non-decision, not an oversight. A future implementation
      phase (a second company, or any code change enforcing the
      conviction vocabulary in intelligence_validator.py) requires its
      own separate authorization -- this decision closes the review
      gate and sets doctrine, nothing more; it adds no company, changes
      no schema, and modifies no validator code.
    rationale: >
      PI-0003 authorized exactly one pilot company but left "reviewed"
      undefined as a completion criterion -- a same-session
      architecture retrospective (conversational analysis, not a
      committed repository document; supporting_artifact below is null
      for that reason) found the architecture held up cleanly under
      real implementation with no doctrine violation, but surfaced two
      categories of finding: implementation improvements (date-format
      validation, next_due arithmetic, YAML/Markdown pairing enforced
      in the validator itself, duplicate-ticker detection -- correctly
      out of scope for this decision, deferred as ordinary maintenance
      against the already-authorized validator) and governance
      ambiguity (the undefined "reviewed" completion criterion, and
      unconstrained vocabulary on conviction.rating specifically, which
      the pilot's own drafting process hit directly -- multiple rounds
      of correcting a proposed "Medium-High" value that fit neither of
      the frozen spec's two illustrative example scales). Conviction is
      elevated to a required-now decision because it is one of the few
      explicitly human-judgment fields in the frozen schema (spec SS12)
      and the ambiguity was demonstrated, not hypothetical, during
      COST's own authoring. risk.severity/risk.status are deliberately
      NOT elevated to the same level -- unlike conviction, no
      conflicting usage has been observed, since only one record
      exists; freezing a vocabulary against a single data point risks
      standardizing the wrong thing prematurely, the same overfitting
      concern already raised and rejected once this session regarding
      per-ticker tailored backtest parameters (see trim_backtest.md
      precedent in CLAUDE.md's Decisions Log). This decision is
      intentionally narrow -- governance only, no schema change, no
      validator change, no second company -- to preserve the
      established Governance -> Implementation -> Validation ->
      Retrospective -> Governance cadence rather than letting pilot
      closure and the next expansion phase blur together.
    supporting_artifact: null  # doctrine-driven governance decision; the
                                # supporting retrospective was
                                # conversational session analysis, not a
                                # committed repository document -- stated
                                # explicitly rather than fabricating a
                                # docs/ path that does not exist.
    status: accepted  # closes the PI-0003 review gate; conviction.rating
                       # vocabulary is now closed doctrine (validator
                       # enforcement NOT added by this decision -- honor
                       # system until/unless a future decision authorizes
                       # a validator change); risk vocabularies remain
                       # explicitly open pending more evidence; a second
                       # company or any validator/schema change still
                       # requires its own separate future authorization.

  - decision_id: PI-0005
    date: 2026-07-17
    category: architecture_governance
    decision: >
      Second-Company Authorization -- XOM. Authorizes exactly the future
      creation of two files: intelligence/companies/XOM.yaml and
      intelligence/companies/XOM.md. This decision does not itself
      create those files -- no implementation occurs as part of
      adopting PI-0005.

      Authorized scope for the future implementation PR: XOM.yaml and
      XOM.md only, using the existing intelligence_validator.py and
      existing tests as-is (no changes to either), plus the ordinary
      branch/commit/push/PR actions that bounded implementation
      requires. Nothing beyond those two files may be created or
      modified by that future PR.

      Required human approvals before that implementation PR is
      opened: portfolio_role_ref, conviction.rating, conviction
      rationale, review cadence, final thesis wording, final risks and
      catalysts, and source-access disclosure. Proposed
      portfolio_role_ref is "band" -- descriptive only, per PI-0003's
      unchanged doctrine, not derived from or synchronized with
      targets.yaml at read time. conviction.rating must use exactly one
      of the four values PI-0004 froze -- Low, Medium, High, Very High
      -- with no synonym, hybrid, or numeric substitute; conviction
      must not be computed, scored, or inferred automatically, same
      human-authorship boundary PI-0002 and PI-0003 already established.

      risks[].severity and risks[].status remain unfrozen exactly as
      PI-0004 left them -- this decision does not freeze, enumerate,
      standardize, or otherwise resolve either vocabulary. The XOM
      record must use clear, human-reviewed free-text language
      consistent with COST's existing style; no validator enforcement
      of either field is authorized.

      Prohibited work, explicit: any change to
      docs/PORTFOLIO_INTELLIGENCE_SPEC.md, intelligence_validator.py,
      or test_intelligence_validator.py; any schema change; any new
      controlled vocabulary; date-arithmetic validation; YAML/Markdown
      pairing enforcement changes; ticker-collision handling; sector or
      industry taxonomy work; reports, dashboards, rollups, or an
      index.yaml; automatic thesis generation; automatic financial
      scoring; valuation analysis; allocation or sizing
      recommendations; margin analysis; allocator integration; any
      change to allocate.py, targets.yaml, holdings.yaml, or margin
      code; any change to COST.yaml/COST.md; and creation of any third
      company.

      Research and evidence requirements for the future draft: clearly
      distinguish reported facts, analytical interpretation, and
      approved human judgment (same three-way split COST's record
      established); prefer primary sources where reasonably
      accessible; disclose transparently wherever a primary endpoint
      was inaccessible, indirect corroboration was used instead, or a
      statement is inference rather than reported fact. Prohibited in
      that draft: unsupported numeric precision, commodity-price
      forecasts presented as fact, and any language implying expected
      market returns.

      Verification the future implementation must demonstrate before
      any PR is opened: intelligence_validator.py's validate_directory
      returns valid=True, company_count=2, errors=[]; full test suite
      passes; exactly two new company files changed, no implementation
      or governance file changed; working tree clean; no draft or
      pending-approval markers remain in either file; and it must go
      through its own separate final pre-merge review with no
      auto-merge, same discipline as PR #71's and PR #72's review
      cycles.

      Stop conditions -- the implementation agent must stop before
      opening a PR and report the issue rather than improvise doctrine
      if: any required human approval above is missing; the existing
      schema cannot represent XOM cleanly; a validator or schema change
      appears necessary; source evidence is too weak to support a
      responsible record; a deferred governance question must be
      resolved first; or scope would exceed the two authorized files.

      Expansion boundary: PI-0005 authorizes XOM only. It does not
      authorize a third company. A successfully implemented XOM record
      does not automatically authorize further expansion -- any
      additional company requires its own separate future governance
      decision, same pattern PI-0003/PI-0004 already established for
      COST.
    rationale: >
      A same-session, read-only candidate review screened the 61
      eligible current holdings (all tickers in targets.yaml's five
      tiers, minus COST, ETFs, and crypto) against eight
      architecture-suitability criteria and recommended XOM as the
      strongest second-company candidate -- selected for architecture
      and workflow suitability, not investment attractiveness. This
      decision deliberately does not restate that review's numeric
      screening score as a company attribute; it is referenced only as
      the completed review that grounds this authorization, the same
      way PI-0003 referenced its own readiness review without folding
      the review's internal scoring into doctrine.

      XOM adds controlled novelty beyond COST along several dimensions
      without requiring any schema, validator, or vocabulary change:
      a different descriptive portfolio_role_ref (band, vs. COST's T2
      -- the corpus's first non-T2 value); commodity and cyclical risk
      framing, distinct from COST's structural/operational retail risk
      profile; an integrated multi-segment business (upstream,
      downstream, chemicals) that remains reviewable without forcing
      excessive complexity into the schema, unlike bank-financial-
      statement or holding-company candidates the same review screened
      out; a different catalyst shape (capex cycles, dividend/buyback
      policy, vs. COST's expansion-guidance catalyst); and the same
      advisory-only, human-reviewed workflow COST already proved out --
      this authorization tests whether that workflow generalizes to a
      second, meaningfully different company, not whether a new
      workflow is needed.

      This selection is explicitly NOT a buy recommendation, a
      valuation conclusion, an allocation decision, a margin decision,
      a change to targets.yaml or holdings.yaml, or a conviction
      determination -- none of those exist yet for XOM; they are
      exactly the judgment-bearing items this decision requires human
      approval on before any implementation PR opens, per PI-0002's and
      PI-0003's already-established human-authorship boundary.

      risks[].severity/risks[].status stay exactly where PI-0004 left
      them -- deliberately unfrozen, one company's worth of evidence
      being insufficient to justify closing either vocabulary. A
      second record does not change that evidentiary math by itself;
      PI-0004's own stated revisit trigger (3-5 records) is unmet at
      two, so this decision does not reopen or advance that question.

      This decision is intentionally narrow, matching the same
      discipline PI-0004 applied to its own scope: it authorizes future
      implementation of exactly two files, requires its own separate
      pre-merge review before any merge, and does not itself perform,
      begin, or imply authorization for any research, drafting, schema
      work, or third company.
    supporting_artifact: null  # doctrine-driven governance decision; the
                                # supporting candidate review was
                                # conversational session analysis, not a
                                # committed repository document -- same
                                # disclosure convention PI-0004 used.
    status: accepted  # authorizes exactly XOM.yaml + XOM.md, future
                       # implementation only -- does NOT create those
                       # files, does NOT authorize a third company, does
                       # NOT touch the validator/schema/allocator/
                       # targets/holdings/margin/COST files, and does
                       # NOT resolve or freeze the deferred risk
                       # vocabularies. Implementation requires its own
                       # separate PR and its own separate pre-merge
                       # review before merge.

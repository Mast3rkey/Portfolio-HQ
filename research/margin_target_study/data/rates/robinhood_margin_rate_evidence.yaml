consistency_note: >
  The Gold lowest-tier spread over the Federal Funds Target upper bound is
  ~+2.5pp in every dated observation where both legs are known (2022-11: 6.5 vs
  4.0 upper; 2025-12: ~5.75 consistent with a ~3.25 upper mid-easing; 2026-07:
  5.0 consistent with a ~2.5 upper). This supports — but does not yet calibrate —
  the pre-registered construction max(floor, FedFunds + spread). NOTE the
  protocol names Fed Funds EFFECTIVE as the construction input while Robinhood's
  own published mechanism references the TARGET upper bound; the two differ by a
  small, regime-dependent amount. Whether to construct from effective (as
  pre-registered) or target-upper (issuer mechanism) is recorded as decision
  item D-4 in G1_DATA_VALIDATION_REPORT.md.

